<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirBrew | Премиальная Кофейня</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1210;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --text-light: #fdfbf7;
            --text-muted: #a89f91;
            --card-bg: #261b18;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Ambient Glow Background */
        .ambient-light {
            position: fixed;
            top: -20%;
            right: -10%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
            filter: blur(80px);
            animation: pulseLight 15s infinite alternate ease-in-out;
        }

        @keyframes pulseLight {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            100% { transform: scale(1.1) translate(-50px, 50px); opacity: 1; }
        }

        /* Typography */
        h1, h2, h3, .logo {
            font-family: 'Playfair Display', serif;
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 10%;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.4s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -5px;
            left: 0;
            background-color: var(--gold);
            transition: width 0.4s;
        }

        .nav-links a:hover {
            color: var(--gold-light);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Header with Background Image */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 0 20px;
            background-image: 
                linear-gradient(rgba(26, 18, 16, 0.7), rgba(26, 18, 16, 0.8)),
                url('../assets/hero/noirbrew.png');
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            position: relative;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 1px; height: 100px;
            background: linear-gradient(to bottom, transparent, var(--gold));
        }

        .tagline {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--gold);
            margin-bottom: 20px;
            animation: fadeInDown 1s ease 0.5s both;
        }

        .hero h1 {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 30px;
            animation: fadeInUp 1.2s ease 0.2s both;
        }

        .hero h1 i {
            color: var(--gold);
            font-style: italic;
        }

        .btn {
            background: transparent;
            color: var(--gold-light);
            border: 1px solid var(--gold);
            padding: 16px 40px;
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease 0.8s both;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--gold);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .btn:hover::before {
            left: 0;
        }

        .btn:hover {
            color: var(--bg-color);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        footer a {
            color: var(--gold);
            text-decoration: none;
            margin-left: 10px;
            transition: color 0.3s;
        }

        footer a:hover {
            color: var(--gold-light);
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>

    <nav>
        <div class="logo">NoirBrew</div>
        <div class="nav-links">
            <a href="#">Кофе</a>
            <a href="#">Ростери</a>
            <a href="#">Клуб</a>
        </div>
    </nav>

    <section class="hero">
        <p class="tagline">Искусство обжарки</p>
        <h1>Темная <i>сторона</i><br>вкуса</h1>
        <button class="btn">Выбрать зерно</button>
    </section>

    <footer>
        <p>NoirBrew Roastery &copy; 2026. <a href="../index.html">Возврат к портфолио &rarr;</a></p>
    </footer>
</body>
</html>
