<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanNest | Modern Architecture | v2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0d0d0d;
            --primary: #c5a059;
            --primary-dim: rgba(197, 160, 89, 0.1);
            --white: #ffffff;
            --dim: rgba(255, 255, 255, 0.4);
            --grid: rgba(255, 255, 255, 0.03);
            --display: 'Syne', sans-serif;
            --body: 'Outfit', sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--body);
            background: var(--bg);
            color: var(--white);
            overflow-x: hidden;
            cursor: none;
        }

        /* ─── CUSTOM CURSOR ─── */
        #cursor {
            position: fixed;
            width: 8px; height: 8px;
            background: var(--primary);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%,-50%);
        }
        #cursor-ring {
            position: fixed;
            width: 40px; height: 40px;
            border: 0.5px solid var(--white);
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%,-50%);
            transition: left 0.1s ease-out, top 0.1s ease-out;
            opacity: 0.3;
        }
        #cursor-ring::before, #cursor-ring::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: var(--white); opacity: 0.2;
        }
        #cursor-ring::before { width: 100vw; height: 0.5px; }
        #cursor-ring::after { height: 100vh; width: 0.5px; }

        /* ─── GRID BG ─── */
        body::before {
            content:'';
            position: fixed; inset:0;
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events:none;
            z-index:0;
        }

        /* ─── CANVAS ARCHITECTURE ─── */
        #canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            padding: 40px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-family: var(--display); font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--primary); }

        .nav-links { display: flex; gap: 40px; }
        .nav-links a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        /* ─── HERO ─── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 120px 6% 80px;
            position: relative;
            z-index: 1;
            background-image: 
                linear-gradient(to right, var(--bg) 0%, rgba(13,13,13,0.7) 100%),
                url('../assets/hero/urbannest.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-info { max-width: 850px; }

        .tagline {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 32px;
            animation: moveDown 1s both;
        }
        .line { width: 40px; height: 1px; background: var(--primary); }

        .hero h1 {
            font-family: var(--display);
            font-size: clamp(3.5rem, 9vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -3px;
            margin-bottom: 40px;
            animation: moveUp 1.2s cubic-bezier(.16,1,.3,1) both;
        }
        .hero h1 span { color: transparent; -webkit-text-stroke: 1px var(--white); }

        .hero-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--dim);
            max-width: 500px;
            margin-bottom: 56px;
            animation: moveUp 1.2s 0.2s cubic-bezier(.16,1,.3,1) both;
        }

        .btn-urban {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 24px 56px;
            font-family: var(--display);
            font-weight: 900;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: none;
            transition: all 0.4s;
            animation: moveUp 1.2s 0.4s cubic-bezier(.16,1,.3,1) both;
        }
        .btn-urban:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 10px 40px rgba(255,255,255,0.1); }

        /* ─── DATA GRID ─── */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 1;
        }
        .stat {
            padding: 60px 40px;
            border-right: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .stat:last-child { border-right: none; }
        .stat-val { font-family: var(--display); font-size: 3rem; color: var(--primary); margin-bottom: 8px; }
        .stat-label { font-size: 0.65rem; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; }

        /* ─── FOOTER ─── */
        footer { padding: 80px 6% 40px; display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; position: relative; z-index: 1; }
        footer a { color: var(--primary); text-decoration: none; }

        @keyframes moveUp { from { opacity: 0; transform: translateY(40px); } }
        @keyframes moveDown { from { opacity: 0; transform: translateY(-40px); } }

        @media (max-width: 1000px) { .stats { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav>
    <div class="logo">URBAN<span>NEST</span></div>
    <div class="nav-links">
        <a href="#">Объекты</a>
        <a href="#">Атуарность</a>
        <a href="#">О нас</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-info">
        <div class="tagline">
            <div class="line"></div>
            Luxury Living v14.2
        </div>
        <h1>ДОМА, КОТОРЫЕ <span>ВДОХНОВЛЯЮТ</span></h1>
        <p class="hero-desc">Переосмысление городской среды. Мы создаем пространство, где архитектура встречается с гармонией и комфортом будущего.</p>
        <button class="btn-urban">Смотреть проекты</button>
    </div>
</section>

<div class="stats">
    <div class="stat">
        <div class="stat-val">24</div>
        <div class="stat-label">Проекта</div>
    </div>
    <div class="stat">
        <div class="stat-val">8</div>
        <div class="stat-label">Наград</div>
    </div>
    <div class="stat">
        <div class="stat-val">12</div>
        <div class="stat-label">Архитекторов</div>
    </div>
    <div class="stat">
        <div class="stat-val">100%</div>
        <div class="stat-label">Качество</div>
    </div>
</div>

<footer>
    <div>© 2026 UrbanNest Architecture</div>
    <a href="../index.html">← Назад</a>
</footer>

<script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        ring.style.left = e.clientX + 'px';
        ring.style.top = e.clientY + 'px';
    });

    document.querySelectorAll('a, button').forEach(el => {
        el.addEventListener('mouseenter', () => {
            ring.style.width = '80px';
            ring.style.height = '80px';
            ring.style.background = 'rgba(255,255,255,0.05)';
        });
        el.addEventListener('mouseleave', () => {
            ring.style.width = '40px';
            ring.style.height = '40px';
            ring.style.background = 'transparent';
        });
    });

    /* ─── ARCHITECTURAL LINES CANVAS ─── */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let w, h, lines = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Line {
        constructor() {
            this.init();
        }
        init() {
            this.vertical = Math.random() > 0.5;
            if(this.vertical) {
                this.x = Math.random() * w;
                this.y = -100;
                this.len = Math.random() * 200 + 100;
                this.v = Math.random() * 2 + 1;
            } else {
                this.x = -100;
                this.y = Math.random() * h;
                this.len = Math.random() * 200 + 100;
                this.v = Math.random() * 2 + 1;
            }
            this.alpha = Math.random() * 0.2 + 0.05;
        }
        update() {
            if(this.vertical) {
                this.y += this.v;
                if(this.y > h + 100) this.init();
            } else {
                this.x += this.v;
                if(this.x > w + 100) this.init();
            }
        }
        draw() {
            ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha})`;
            ctx.beginPath();
            if(this.vertical) {
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.len);
            } else {
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.len, this.y);
            }
            ctx.stroke();
        }
    }

    for (let i = 0; i < 30; i++) lines.push(new Line());

    function ani() {
        ctx.clearRect(0,0,w,h);
        lines.forEach(l => {
            l.update();
            l.draw();
        });
        requestAnimationFrame(ani);
    }
    ani();
</script>

</body>
</html>
