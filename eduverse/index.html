<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVerse | VR Образование</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b071a;
            --primary: #c026d3;
            --secondary: #4f46e5;
            --accent: #f472b6;
            --text-light: #fdf2f8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 3D Cosmic Background and Hero Image */
        .scene {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(11, 7, 26, 0.6), rgba(11, 7, 26, 0.9)),
                url('../assets/hero/eduverse.png');
            background-size: cover;
            background-position: center;
            perspective: 800px;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(60px);
            opacity: 0.3;
            animation: float 20s ease-in-out infinite alternate;
        }

        .orb-1 { top: -10%; left: -10%; }
        .orb-2 { bottom: -20%; right: -10%; animation-delay: -5s; background: linear-gradient(135deg, var(--secondary), var(--accent)); }
        
        .stars {
            background: transparent url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="1" fill="white" opacity="0.5"/><circle cx="50" cy="80" r="1.5" fill="white" opacity="0.3"/><circle cx="80" cy="30" r="0.5" fill="white" opacity="0.8"/></svg>');
            position: absolute;
            width: 200vw;
            height: 200vh;
            animation: rotateStars 100s linear infinite;
        }

        @keyframes rotateStars {
            from { transform: rotate(0deg) translate(-50%, -50%); }
            to { transform: rotate(360deg) translate(-50%, -50%); }
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1) rotateX(0); }
            100% { transform: translateY(100px) scale(1.2) rotateX(20deg); }
        }

        /* Nav */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(11,7,26,0.9), transparent);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--accent), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-join {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 10px 24px;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-join:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px var(--accent);
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(192, 38, 211, 0.5);
        }

        .hero p {
            font-size: 1.25rem;
            max-width: 600px;
            color: rgba(253, 242, 248, 0.8);
            margin-bottom: 40px;
        }

        .metrics {
            display: flex;
            gap: 40px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .metric {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
        }

        .metric h3 {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .metric p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(253, 242, 248, 0.6);
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
            margin-top: 50px;
            position: relative;
            z-index: 10;
        }

        a.back-link {
            color: var(--accent);
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            transition: color 0.3s;
        }
        
        a.back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="stars"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header>
        <div class="logo">EduVerse</div>
        <button class="btn-join">Начать погружение</button>
    </header>

    <section class="hero">
        <h1>Преодолей<br>Гравитацию Знаний</h1>
        <p>Изучай анатомию, космос и историю внутри метавселенной. Виртуальные классы с эффектом полного погружения.</p>
        
        <div class="metrics">
            <div class="metric">
                <h3>5K+</h3>
                <p>3D Моделей</p>
            </div>
            <div class="metric">
                <h3>1M</h3>
                <p>Студентов</p>
            </div>
            <div class="metric">
                <h3>99%</h3>
                <p>Усвоение</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 EduVerse Platform.</p>
        <a href="../index.html" class="back-link">&larr; В портфолио</a>
    </footer>
</body>
</html>
